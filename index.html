<!DOCTYPE html>
<!-- DOCTYPE — первая строка любого HTML-документа.
     Говорит браузеру: "это современный HTML5, отображай по стандартам".
     Без DOCTYPE браузер включает "режим совместимости" —
     отображение ломается непредсказуемо. -->

<html lang="ru">
<!-- lang="ru" — указывает язык страницы.
     Это помогает поисковикам правильно индексировать сайт
     и позволяет браузеру предлагать перевод на другие языки. -->

<head>
  <!-- HEAD — служебная секция, содержимое не отображается на странице.
       Здесь: настройки кодировки, заголовок вкладки, подключение стилей и скриптов. -->

  <!-- Кодировка UTF-8 — поддерживает кириллицу, латиницу и любые символы.
       Всегда должна идти первой в <head>, иначе часть страницы
       может отобразиться до неё и возникнут кракозябры. -->
  <meta charset="UTF-8">

  <!-- viewport — ключевая мета-тега для адаптивности (мобильных устройств).
       width=device-width — ширина страницы = ширине экрана устройства.
       initial-scale=1.0 — начальный масштаб 100%, без принудительного zoom.
       Без этого мобильный браузер отобразит страницу как маленькую копию
       десктопного сайта и пользователь увидит нечитаемый мелкий текст. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Для старых версий Internet Explorer — говорим использовать
       последний доступный движок отрисовки, а не режим совместимости. -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <!-- Заголовок вкладки браузера -->
  <title>Free-psd</title>

  <!-- Шрифты с Google Fonts.
       PT Serif — шрифт с засечками для основного текста (классика, доверие).
       Roboto — шрифт без засечек для кнопок, меню, заголовков (современно, чётко).
       subset=cyrillic — загружаем только кириллицу + латиницу, не тянем весь шрифт.
       display=swap — пока шрифт грузится, показываем системный (нет "мигания" белого экрана). -->
  <link href="https://fonts.googleapis.com/css?family=PT+Serif:400,700|Roboto:400,500&display=swap&subset=cyrillic"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap&subset=cyrillic,cyrillic-ext,latin-ext"
    rel="stylesheet">

  <!-- normalize.css — "сброс" стилей браузера.
       Разные браузеры (Chrome, Firefox, Safari) рендерят элементы по-разному.
       Normalize выравнивает их поведение, чтобы страница выглядела одинаково. -->
  <link rel="stylesheet" href="css/normalize.css">

  <!-- Иконочный шрифт icomoon — заменяет изображения иконок.
       Телефон, конверт, галочка, стрелки — всё это символы шрифта.
       Преимущество: масштабируются без потери качества, красятся через CSS color. -->
  <link rel="stylesheet" href="css/iconfonts.css">

  <!-- Стили модального окна Fancybox — библиотека для красивых попапов.
       Подключаем ДО style.css, чтобы наши стили могли переопределить библиотечные. -->
  <link rel="stylesheet" href="css/jquery.fancybox.min.css">

  <!-- Стили слайдера Slick — библиотека для слайдеров.
       Даёт базовые стили позиционирования, которые мы дополняем в style.css. -->
  <link rel="stylesheet" href="css/slick.css">

  <!-- Стили плагина FormStyler — делает кастомный select вместо стандартного.
       Стандартный <select> выглядит по-разному в каждом браузере — некрасиво.
       FormStyler рисует единый дизайн везде. -->
  <link rel="stylesheet" href="css/jquery.formstyler.css">

  <!-- Главные стили сайта — подключаем ПОСЛЕДНИМИ,
       чтобы они имели наибольший приоритет и перекрывали библиотечные стили. -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Адаптивные стили — самый последний файл.
       Он содержит media queries для 1200px, 768px и 480px.
       Должен идти после style.css, иначе основные стили перекроют адаптивные. -->
  <link rel="stylesheet" href="css/media.css">

  <!-- jQuery — JavaScript-библиотека, на которой работают все плагины ниже.
       Загружается с CDN Google — быстро и надёжно.
       defer — скрипт загружается параллельно с HTML, но выполняется после
       полного разбора страницы. Это ускоряет отображение контента. -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js" defer></script>

  <!-- Скрипт модальных окон Fancybox. defer — см. выше. -->
  <script src="js/jquery.fancybox.min.js" defer></script>

  <!-- Скрипт слайдера Slick. defer — загружается после jQuery. -->
  <script src="js/slick.min.js" defer></script>

  <!-- Скрипт кастомного select FormStyler. defer — после jQuery. -->
  <script src="js/jquery.formstyler.min.js" defer></script>

  <!-- Главный скрипт проекта: инициализирует слайдеры, select, бургер-меню.
       Загружается самым последним — ему нужны все библиотеки выше. -->
  <script src="js/main.js" defer></script>
</head>

<body>

  <!-- =============================================================
</body>

</html>
